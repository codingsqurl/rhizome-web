<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhizome - Your Second Brain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="sidebar">
        <div class="header">
            <div class="logo">RHIZOME</div>
            <div class="subtitle">Your Second Brain</div>
        </div>
        
        <div class="search-box">
            <input type="text" id="search" placeholder="Search thoughts..." oninput="handleSearch(this.value)">
        </div>
        
        <div class="section-title">Regions</div>
        <div class="regions" id="regions"></div>
        
        <div class="section-title">Notes</div>
        <div class="notes-list" id="notes"></div>
        
        <div class="bottom-bar">
            <button class="btn btn-primary" onclick="createNote()">+ New Thought</button>
        </div>
    </div>
    
    <div class="detail-panel" id="detail">
        <div class="detail-title" id="detailTitle">Thought</div>
        <div class="detail-field">
            <div class="detail-label">Title</div>
            <input class="detail-input" id="detailTitleInput" oninput="updateCurrentNote()">
        </div>
        <div class="detail-field">
            <div class="detail-label">Content</div>
            <textarea class="detail-textarea" id="detailContent" oninput="updateCurrentNote()"></textarea>
        </div>
        <div class="detail-field">
            <div class="detail-label">Region</div>
            <select class="detail-input" id="detailRegion" onchange="updateCurrentNote()"></select>
        </div>
        <div class="bottom-bar">
            <button class="btn" onclick="deleteCurrentNote()">Delete</button>
            <button class="btn" onclick="closeDetail()">Close</button>
        </div>
    </div>
    
    <div class="stats" id="stats">0 thoughts</div>
    <div class="hint">Drag rotate · Scroll zoom · Click node</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
